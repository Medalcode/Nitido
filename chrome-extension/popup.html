<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nítido</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 400px; max-height: 600px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; overflow-y: auto; }
    header { padding: 14px 16px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 18px; color: #2dd4bf; }
    header h1 span { font-weight: 400; color: #475569; font-size: 12px; }
    .actions { display: flex; gap: 6px; }
    .actions button { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }
    .actions button:hover { background: #334155; color: #e2e8f0; }
    main { padding: 12px 16px; }
    textarea { width: 100%; height: 100px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; padding: 10px; font-size: 13px; resize: vertical; font-family: inherit; }
    textarea:focus { outline: none; border-color: #2dd4bf; }
    .btn-primary { width: 100%; padding: 10px; background: #2dd4bf; color: #0f172a; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
    .btn-primary:hover { background: #14b8a6; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: transparent; border: 1px solid #334155; color: #94a3b8; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; margin-top: 8px; }
    .btn-secondary:hover { border-color: #2dd4bf; color: #2dd4bf; }
    .status { text-align: center; padding: 16px; color: #64748b; font-size: 13px; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #334155; border-top-color: #2dd4bf; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .resultado { margin-top: 12px; }
    .resumen-box { background: #1e293b; border-radius: 8px; padding: 12px; margin-bottom: 12px; font-size: 13px; line-height: 1.5; border: 1px solid #334155; }
    .resumen-box h3 { color: #2dd4bf; font-size: 13px; margin-bottom: 6px; }
    .clausula { padding: 10px 12px; border-radius: 6px; margin-bottom: 8px; font-size: 12px; line-height: 1.4; }
    .critico { background: #7f1d1d1a; border-left: 3px solid #ef4444; }
    .alto { background: #78350f1a; border-left: 3px solid #f97316; }
    .medio { background: #1e3a5f1a; border-left: 3px solid #3b82f6; }
    .bajo { background: #1a3a2c1a; border-left: 3px solid #22c55e; }
    .clausula .tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-bottom: 4px; text-transform: uppercase; }
    .tag-critico { background: #ef4444; color: #fff; }
    .tag-alto { background: #f97316; color: #fff; }
    .tag-medio { background: #3b82f6; color: #fff; }
    .tag-bajo { background: #22c55e; color: #0f172a; }
    .clausula .fundamento { color: #94a3b8; font-size: 11px; margin-top: 4px; }
    .error { color: #ef4444; text-align: center; padding: 16px; font-size: 13px; }
    .score-bar { display: flex; align-items: center; gap: 8px; margin: 10px 0; }
    .score-bar .bar { flex: 1; height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; }
    .score-bar .fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
    .score-bar .label { font-size: 12px; font-weight: 600; min-width: 40px; }
    .glosario-toggle { background: none; border: none; color: #2dd4bf; font-size: 12px; cursor: pointer; margin-top: 8px; padding: 0; }
    .glosario-toggle:hover { text-decoration: underline; }
    .glosario { display: none; margin-top: 8px; padding: 10px; background: #1e293b; border-radius: 6px; font-size: 12px; }
    .glosario dt { color: #2dd4bf; font-weight: 600; margin-top: 4px; }
    .glosario dd { color: #94a3b8; margin-left: 8px; }
    .recomendaciones { margin-top: 12px; }
    .recomendaciones h3 { color: #2dd4bf; font-size: 13px; margin-bottom: 6px; }
    .recomendaciones li { font-size: 12px; color: #94a3b8; margin-bottom: 4px; margin-left: 16px; }
    footer { padding: 10px 16px; border-top: 1px solid #1e293b; text-align: center; font-size: 10px; color: #475569; }
  </style>
</head>
<body>
  <header>
    <h1>Nítido <span>beta</span></h1>
    <div class="actions">
      <button id="getPageBtn" title="Extraer texto de la página actual">📄 Pagina</button>
      <button id="clearBtn" title="Limpiar">✕</button>
    </div>
  </header>
  <main>
    <textarea id="input" placeholder="Pega el contrato, términos y condiciones o texto legal aquí..."></textarea>
    <button id="analyzeBtn" class="btn-primary">Analizar documento</button>
    <div id="loading" class="status" style="display:none">
      <div class="spinner"></div>
      <div>Analizando documento...</div>
    </div>
    <div id="result" class="resultado"></div>
  </main>
  <footer>No constituye asesoría legal profesional</footer>
  <script src="popup.js"></script>
</body>
</html>
