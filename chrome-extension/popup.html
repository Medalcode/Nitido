<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nitido</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 380px; font-family: -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; }
    header { padding: 16px; border-bottom: 1px solid #1e293b; }
    header h1 { font-size: 20px; color: #2dd4bf; }
    header p { font-size: 12px; color: #64748b; margin-top: 2px; }
    main { padding: 16px; }
    textarea { width: 100%; height: 120px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; padding: 12px; font-size: 13px; resize: vertical; }
    button { width: 100%; padding: 10px; background: #2dd4bf; color: #0f172a; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; margin-top: 12px; }
    button:hover { background: #14b8a6; }
    .resultado { margin-top: 16px; }
    .clausula { padding: 10px; border-radius: 6px; margin-bottom: 8px; font-size: 13px; }
    .critico { background: #7f1d1d; border-left: 4px solid #ef4444; }
    .alto { background: #78350f; border-left: 4px solid #f97316; }
    .medio { background: #1a3a5c; border-left: 4px solid #3b82f6; }
    .bajo { background: #1a3a2c; border-left: 4px solid #22c55e; }
    .loading { text-align: center; padding: 20px; color: #64748b; }
    .error { color: #ef4444; padding: 12px; text-align: center; }
  </style>
</head>
<body>
  <header>
    <h1>Nítido</h1>
    <p>Descifra documentos legales al español simple</p>
  </header>
  <main>
    <textarea id="input" placeholder="Pega el texto del contrato, términos o documento legal aquí..."></textarea>
    <button id="analyzeBtn">Analizar documento</button>
    <div id="result" class="resultado"></div>
    <div id="loading" class="loading" style="display:none">Analizando documento...</div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
